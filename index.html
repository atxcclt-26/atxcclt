<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Revisión de cargos</title>

  <!-- PWA / icono en pantalla de inicio (iPhone) -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a7f37" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Cargos" />
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    h1 { font-size: 1.4rem; margin: 0; }
    #estado-carga { margin: 14px 0; color: #444; }
    .build { color: #999; font-size: .72rem; margin: 4px 0 0; }
    #estado-carga.error { color: #b00020; }
    .review { display: none; }
    body.logged-in .review { display: block; }
    #progreso { color: #555; font-size: .9rem; margin: 8px 0; }

    #filtros { display: flex; flex-wrap: wrap; gap: 10px 14px; align-items: flex-end; margin: 12px 0 16px; }
    #filtros .f { display: flex; flex-direction: column; font-size: .72rem; color: #666; gap: 2px; }
    #btnLimpiar { padding: 6px 12px; }

    /* Filtros multiselección estilo Excel */
    #filtros .msel { position: relative; }
    .msel-btn { padding: 5px 8px; min-width: 120px; max-width: 200px; overflow: hidden; text-overflow: ellipsis;
                text-align: left; background: #fff; border: 1px solid #bbb; border-radius: 4px; cursor: pointer; font-size: .8rem; }
    .msel-btn.activo { border-color: #1a7f37; background: #eaf6ee; font-weight: 600; }
    .msel-panel { position: absolute; top: 100%; left: 0; z-index: 50; margin-top: 2px; background: #fff;
                  border: 1px solid #bbb; border-radius: 6px; box-shadow: 0 4px 14px rgba(0,0,0,.18);
                  padding: 8px; min-width: 200px; max-width: 320px; }
    .msel-busca { width: 100%; box-sizing: border-box; margin-bottom: 6px; padding: 4px 6px; }
    .msel-lista { max-height: 260px; overflow: auto; display: flex; flex-direction: column; gap: 2px; }
    .msel-item { display: flex; align-items: center; gap: 6px; font-size: .82rem; color: #222;
                 padding: 3px 4px; border-radius: 4px; cursor: pointer; white-space: nowrap; }
    .msel-item:hover { background: #f2f2f2; }
    .msel-todo { border-bottom: 1px solid #e2e2e2; margin-bottom: 4px; padding-bottom: 5px; font-weight: 600; }

    .tabla-wrap { overflow: auto; }
    table { border-collapse: collapse; width: 100%; font-size: .9rem; }
    th, td { border: 1px solid #e2e2e2; padding: 6px 9px; text-align: left; white-space: nowrap; }
    th { background: #f5f5f5; position: sticky; top: 0; }
    td.estado.ok  { color: #1a7f37; font-weight: 600; }
    td.estado.nok { color: #b42318; font-weight: 600; }
    td.estado.pend { color: #999; }
    .accion { white-space: nowrap; }
    .accion button { padding: 4px 10px; margin: 2px 5px 2px 0; border: 0; border-radius: 6px; color: #fff; cursor: pointer; font-weight: 600; font-size: .8rem; }
    .accion .ok  { background: #1a7f37; }
    .accion .nok { background: #b42318; }
    .accion .cat { background: #2b6cb0; }
    .accion .war.no { background: #f7d4d0; color: #b42318; }
    .accion .war.si { background: #d5efdc; color: #1a7f37; }
    .accion button:disabled { opacity: .4; cursor: default; }
    /* Botones dentro de las celdas (SINO, CATEGORIA, COMENTARIO) */
    td .mini { padding: 2px 8px; margin-left: 6px; border: 0; border-radius: 6px; color: #fff; cursor: pointer; font-weight: 600; font-size: .72rem; vertical-align: middle; }
    td .mini.ok  { background: #1a7f37; }
    td .mini.nok { background: #b42318; margin-left: 3px; }
    td .mini.cat { background: #2b6cb0; }
    td .mini.com { background: #6b7280; }
    td .mini:disabled { opacity: .4; cursor: default; }
    td.sino2.ok  { color: #1a7f37; font-weight: 600; }
    td.sino2.nok { color: #b42318; font-weight: 600; }
    td.sino2.pend { color: #999; }
    td.war.si { color: #1a7f37; font-weight: 600; }
    td.war.no { color: #b42318; font-weight: 600; }
    /* Fondo de celda para SINO y CATEGORIA (verde = ok / rojo = pendiente) */
    td.cell-green { background: #d5efdc; }
    td.cell-red   { background: #f7d4d0; }
  </style>
</head>
<body>

  <header>
    <h1>Revisión de cargos</h1>
    <button id="loginBtn" type="button">Iniciar sesión</button>
  </header>
  <p class="build">Generado el 10/07/2026</p>

  <p id="estado-carga">Inicia sesión para cargar el fichero.</p>

  <section class="review">
    <div id="progreso"></div>
    <div id="filtros"></div>
    <div class="tabla-wrap">
      <table id="tabla"><thead></thead><tbody></tbody></table>
    </div>
  </section>

  <script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>
  <script src="app.js?v=202607101800"></script>
</body>
</html>
